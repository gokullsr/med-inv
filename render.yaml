services:
  - type: web
    name: med-inv-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: med-inv-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && node server.js
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: CI
        value: "false"
      - key: PORT
        value: 3000
